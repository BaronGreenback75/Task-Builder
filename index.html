<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESS Assessment Task Sheet Builder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.8.2/docx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --gess-green: #00A651;
            --gess-dark-green: #008C44;
            --gess-light-green: #E8F5E9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--gess-green) 0%, var(--gess-dark-green) 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--gess-green) 0%, var(--gess-dark-green) 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .progress-step {
            flex: 1;
            text-align: center;
            position: relative;
            padding: 10px;
        }

        .progress-step::before {
            content: '';
            position: absolute;
            top: 15px;
            left: -50%;
            right: 50%;
            height: 3px;
            background: #dee2e6;
            z-index: -1;
        }

        .progress-step:first-child::before {
            display: none;
        }

        .progress-step.active::before {
            background: var(--gess-green);
        }

        .step-number {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #dee2e6;
            color: #6c757d;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .progress-step.active .step-number {
            background: var(--gess-green);
            color: white;
        }

        .progress-step.completed .step-number {
            background: var(--gess-green);
            color: white;
        }

        .step-label {
            font-size: 11px;
            color: #6c757d;
            display: block;
        }

        .content {
            padding: 40px;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--gess-green);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .programme-selection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .programme-btn {
            padding: 30px 20px;
            border: 3px solid #e9ecef;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .programme-btn:hover {
            border-color: var(--gess-green);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 166, 81, 0.2);
        }

        .programme-btn.selected {
            border-color: var(--gess-green);
            background: var(--gess-light-green);
        }

        .programme-btn i {
            font-size: 40px;
            color: var(--gess-green);
            margin-bottom: 15px;
            display: block;
        }

        .programme-btn span {
            display: block;
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: flex-start;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .checkbox-item:hover {
            background: #f8f9fa;
            border-color: var(--gess-green);
        }

        .checkbox-item input[type="checkbox"] {
            margin-right: 10px;
            margin-top: 3px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            flex-grow: 1;
        }

        .strand-selection {
            margin-left: 30px;
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .strand-checkbox {
            display: flex;
            align-items: center;
            padding: 5px 10px;
            background: var(--gess-light-green);
            border-radius: 5px;
            font-size: 13px;
        }

        .strand-checkbox input {
            margin-right: 5px;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: #f8f9fa;
            border-top: 2px solid #e9ecef;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--gess-green);
            color: white;
        }

        .btn-primary:hover {
            background: var(--gess-dark-green);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 166, 81, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn:disabled {
            background: #dee2e6;
            color: #6c757d;
            cursor: not-allowed;
            transform: none;
        }

        .preview-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .preview-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .ai-level-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .ai-level-btn {
            flex: 1;
            min-width: 150px;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .ai-level-btn:hover {
            border-color: var(--gess-green);
            transform: translateY(-2px);
        }

        .ai-level-btn.selected {
            border-color: var(--gess-green);
            background: var(--gess-light-green);
        }

        .ai-level-btn strong {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }

        .ai-level-btn small {
            display: block;
            color: #6c757d;
            font-size: 12px;
        }

        .success-message {
            text-align: center;
            padding: 40px;
        }

        .success-message i {
            font-size: 80px;
            color: var(--gess-green);
            margin-bottom: 20px;
        }

        .success-message h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .success-message p {
            color: #6c757d;
            margin-bottom: 30px;
        }

        .criterion-container {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .criterion-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .criterion-header input[type="checkbox"] {
            margin-right: 10px;
            width: 20px;
            height: 20px;
        }

        .criterion-header label {
            font-size: 16px;
            font-weight: 600;
            color: var(--gess-green);
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-file-alt"></i> GESS Assessment Task Sheet Builder</h1>
            <p>Create professional IB assessment documents in minutes</p>
        </div>

        <div class="progress-bar">
            <div class="progress-step active">
                <div class="step-number">1</div>
                <span class="step-label">Programme</span>
            </div>
            <div class="progress-step">
                <div class="step-number">2</div>
                <span class="step-label">Details</span>
            </div>
            <div class="progress-step">
                <div class="step-number">3</div>
                <span class="step-label">Task Info</span>
            </div>
            <div class="progress-step">
                <div class="step-number">4</div>
                <span class="step-label">Criteria</span>
            </div>
            <div class="progress-step">
                <div class="step-number">5</div>
                <span class="step-label">Success</span>
            </div>
            <div class="progress-step">
                <div class="step-number">6</div>
                <span class="step-label">ATL & AI</span>
            </div>
            <div class="progress-step">
                <div class="step-number">7</div>
                <span class="step-label">Rubric</span>
            </div>
            <div class="progress-step">
                <div class="step-number">8</div>
                <span class="step-label">Preview</span>
            </div>
        </div>

        <div class="content">
            <!-- Step 1: Programme Selection -->
            <div class="step active" id="step1">
                <h2>Select Your Programme</h2>
                <div class="programme-selection">
                    <button type="button" class="programme-btn" onclick="selectProgramme('MYP')">
                        <i class="fas fa-graduation-cap"></i>
                        <span>Middle Years Programme (MYP)</span>
                    </button>
                    <button type="button" class="programme-btn" onclick="selectProgramme('DP')">
                        <i class="fas fa-user-graduate"></i>
                        <span>Diploma Programme (DP)</span>
                    </button>
                    <button type="button" class="programme-btn" onclick="selectProgramme('CP')">
                        <i class="fas fa-briefcase"></i>
                        <span>Career-related Programme (CP)</span>
                    </button>
                </div>
            </div>

            <!-- Step 2: Subject and Class Details -->
            <div class="step" id="step2">
                <h2>Subject and Class Details</h2>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" required>
                        <option value="">Select a subject...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="grade">Grade/Year</label>
                    <select id="grade" required>
                        <option value="">Select grade...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="dueDate">Due Date</label>
                    <input type="date" id="dueDate" required>
                </div>
                <div class="form-group">
                    <label for="homeroom">Homeroom</label>
                    <input type="text" id="homeroom" placeholder="e.g., 9A" required>
                </div>
